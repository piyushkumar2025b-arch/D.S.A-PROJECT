<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Omega Agent — SAAP v5.5</title>
<style>
:root{--bg:#060b18;--bg2:#0b1225;--surface:#0f1a30;--surface2:#152035;--border:#1e3350;--border2:#253d5c;--blue:#3b82f6;--cyan:#06b6d4;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--orange:#f97316;--text:#f0f4ff;--text2:#94a8c8;--text3:#5a7090;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;}
#header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;}
#header h1{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#c084fc,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.badge{padding:3px 10px;border-radius:99px;font-size:.68rem;font-weight:700;text-transform:uppercase;}
.badge.omega{background:rgba(139,92,246,.15);color:#c084fc;border:1px solid rgba(139,92,246,.3);}
.badge.live{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.3);}
#layout{display:grid;grid-template-columns:240px 1fr;height:calc(100vh - 62px);overflow:hidden;}
#agents-list{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:10px 0;}
.cat-header{padding:8px 14px 4px;font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-weight:700;}
.agent-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;border-bottom:1px solid rgba(30,51,80,.3);transition:all .15s;}
.agent-item:hover{background:var(--surface);}
.agent-item.active{background:rgba(59,130,246,.08);border-left:3px solid var(--blue);}
.agent-item .ai{font-size:1rem;}
.agent-item .al{font-size:.78rem;color:var(--text2);flex:1;}
.agent-item .at{font-size:.6rem;padding:1px 6px;border-radius:99px;background:rgba(139,92,246,.1);color:#c084fc;border:1px solid rgba(139,92,246,.2);}
.at.exp{background:rgba(245,158,11,.08);color:var(--amber);border-color:rgba(245,158,11,.2);}
.at.live{background:rgba(34,197,94,.08);color:#4ade80;border-color:rgba(34,197,94,.2);}
#workspace{display:flex;flex-direction:column;overflow:hidden;}
#agent-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:flex-start;gap:14px;flex-shrink:0;}
#agent-icon{font-size:2.2rem;}
#agent-info{flex:1;}
#agent-info h2{font-size:1rem;font-weight:700;color:var(--text);}
#agent-info p{font-size:.78rem;color:var(--text2);margin-top:2px;}
#agent-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.tag{font-size:.65rem;padding:2px 8px;border-radius:99px;background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
#run-btn{background:linear-gradient(135deg,#6d28d9,#8b5cf6);border:none;color:#fff;padding:8px 18px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;flex-shrink:0;transition:all .15s;}
#run-btn:hover{background:linear-gradient(135deg,#7c3aed,#a78bfa);transform:translateY(-1px);}
#run-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
#params-area{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;flex-shrink:0;}
#params-area label{font-size:.72rem;color:var(--text3);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;}
#goal-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:.82rem;resize:vertical;min-height:60px;}
#goal-input:focus{outline:none;border-color:var(--purple);}
#output-area{flex:1;overflow-y:auto;padding:16px 20px;}
.output-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
.output-block h4{font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.output-block pre{font-size:.73rem;color:var(--text2);white-space:pre-wrap;word-break:break-word;line-height:1.6;font-family:'JetBrains Mono',monospace;}
.thinking{display:flex;align-items:center;gap:8px;color:var(--text3);font-size:.78rem;padding:12px 0;}
.dots span{animation:blink 1.2s infinite; display:inline-block;}
.dots span:nth-child(2){animation-delay:.2s;} .dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,100%{opacity:.2;}50%{opacity:1;}}
.research-badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:.65rem;font-weight:700;background:rgba(139,92,246,.12);color:#c084fc;border:1px solid rgba(139,92,246,.2);}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:8px;}
.metric-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;}
.metric-card .mv{font-size:1.3rem;font-weight:700;color:var(--text);}
.metric-card .ml{font-size:.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
#tokens-bar{font-size:.72rem;color:var(--text3);padding:4px 20px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;}
</style>
</head>
<body>
<div id="header">
  <span style="font-size:1.8rem;">Ω</span>
  <h1>Omega Agent Collective</h1>
  <span class="badge omega">OMEGA</span>
  <span class="badge live">SECTION 7</span>
  <span style="margin-left:auto;font-size:.72rem;color:var(--text3);">Research-Oriented AI Agents · 18 Specialist Agents · Groq-Powered</span>

      <button id="run-btn" onclick="runAgent()" disabled>▶ Run Agent</button>
    </div>
    <div id="params-area">
      <label>Research Goal / Prompt</label>
      <textarea id="goal-input" placeholder="Describe what you want this agent to research or analyse..."></textarea>
    </div>
    <div id="output-area"><div style="color:var(--text3);text-align:center;padding:40px 20px;font-size:.85rem;">← Select an agent and provide a goal to begin</div></div>
    <div id="tokens-bar">Total tokens used this session: <span id="total-tokens">0</span></div>
  </div>
</div>

Return JSON: { "market": "..", "market_size_estimate": "..", "key_players": [{"name": "..", "type": "incumbent|challenger|disruptor|regulator", "power_score": 0-10, "moat": "..", "weakness": ".."}], "power_dynamics": "..", "disruption_vectors": [{"vector": "..", "source": "..", "probability": 0-100, "timeline": ".."}], "regulatory_landscape": "..", "emergent_opportunities": [{"opportunity": "..", "size": "..", "difficulty": "low|medium|high", "first_mover_advantage": true|false}], "structural_recommendation": ".." }`

Return JSON: { "project": "..", "imagined_failure_date": "..", "failure_narrative": "..", "root_causes": [{"cause": "..", "category": "human|technical|market|regulatory|strategic", "probability": 0-100, "detectability": "early|late|never", "mitigation": ".."}], "high_risk_assumptions": ["..", ".."], "early_warning_dashboard": [{"metric": "..", "threshold": "..", "action": ".."}], "probability_of_failure_estimate": 0-100, "top_3_interventions": ["..", "..", ".."] }`

Return JSON: { "concept": "..", "core_essence": "..", "analogies": [{"level": "novice|intermediate|expert", "analogy": "..", "mapping": {"concept_part": "..", "analogy_part": ".."},"where_it_breaks_down": "..", "insight_unlocked": ".."}], "metaphors": ["..", ".."], "thought_experiments": ["..", ".."], "recommended_for_audience": {"novice": "analogy1", "expert": "analogy3"} }`
  },

let selectedAgent = null;

// ─── Render ───
function renderAgentList(){
  const panel = document.getElementById('agents-list');
  const cats = {};
  AGENTS.forEach(a=>{ if(!cats[a.cat]) cats[a.cat]=[]; cats[a.cat].push(a); });
  Object.entries(cats).forEach(([cat, ags])=>{
    const ch = document.createElement('div'); ch.className='cat-header'; ch.textContent=cat; panel.appendChild(ch);
    ags.forEach(a=>{
      const item = document.createElement('div');
      item.className='agent-item';
      item.innerHTML=`<span class="ai">${a.icon}</span><span class="al">${a.label}</span><span class="at ${a.type}">${a.type}</span>`;
      item.onclick=()=>selectAgent(a);
      panel.appendChild(item);
    });
  });
}

function selectAgent(agent){
  document.querySelectorAll('.agent-item').forEach(i=>i.classList.remove('active'));
  event.currentTarget.classList.add('active');
  selectedAgent = agent;
  document.getElementById('agent-icon').textContent = agent.icon;
  document.getElementById('agent-name').textContent = agent.label;
  document.getElementById('agent-desc').textContent = agent.desc;
  document.getElementById('agent-tags').innerHTML = agent.tags.map(t=>`<span class="tag">${t}</span>`).join('');
  document.getElementById('run-btn').disabled = false;
  document.getElementById('goal-input').placeholder = `Enter your research question or goal for ${agent.label}...`;
  document.getElementById('output-area').innerHTML = `<div style="color:var(--text3);text-align:center;padding:30px;font-size:.82rem;">Click "▶ Run Agent" to start ${agent.label}</div>`;
}

async function runAgent(){
  if(!selectedAgent) return;
  const key = GROQ_KEY;
  if(!key){ alert('⚠️ No Groq API key. Paste your key in the SAAP sidebar.'); return; }
  const goal = document.getElementById('goal-input').value.trim() || 'Analyse the current landscape and generate insights';
  const btn = document.getElementById('run-btn');
  btn.disabled = true; btn.textContent = '⏳ Running...';
  const out = document.getElementById('output-area');
  out.innerHTML = `<div class="thinking">
    ${selectedAgent.icon} <strong>${selectedAgent.label}</strong> is thinking
    <span class="dots"><span>.</span><span>.</span><span>.</span></span>
  </div>`;

  try {
    const model = 'llama-3.3-70b-versatile';
    const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body: JSON.stringify({
        model, max_tokens: 2000, temperature: 0.5,
        messages:[
          {role:'system', content: selectedAgent.system},
          {role:'user', content: `Goal/Question: ${goal}\n\nGenerate comprehensive, specific, and realistic output for this research-oriented analysis. Be detailed and insightful.`}
        ]
      })
    });
    const data = await resp.json();
    if(data.error) throw new Error(data.error.message);
    const tokens = data.usage?.total_tokens || 0;
    sessionTokens += tokens;
    document.getElementById('total-tokens').textContent = sessionTokens.toLocaleString();
    let raw = data.choices[0].message.content.trim();
    if(raw.startsWith('```')){raw=raw.split('\n').slice(1).join('\n');} if(raw.endsWith('```')){raw=raw.slice(0,-3).trim();}
    let parsed;
    try{ parsed = JSON.parse(raw); } catch{ parsed = {raw_output: raw}; }
    renderOutput(parsed, tokens);
  } catch(err){
    out.innerHTML = `<div class="output-block" style="border-color:var(--red)"><h4>❌ Error</h4><pre>${err.message}</pre></div>`;
  }
  btn.disabled=false; btn.textContent='▶ Run Agent';
}

function renderOutput(result, tokens){
  const out = document.getElementById('output-area');
  let html = `
    <div class="output-block" style="border-color:var(--purple)">
      <h4>${selectedAgent.icon} ${selectedAgent.label} — Output <span class="research-badge">${tokens} tokens</span></h4>
      ${renderValue(result)}
    </div>`;
  if(result.metric_grid) {
    html += `<div class="metric-grid">${result.metric_grid.map(m=>`<div class="metric-card"><div class="mv">${m.value}</div><div class="ml">${m.label}</div></div>`).join('')}</div>`;
  }
  out.innerHTML = html;
}

function renderValue(val, depth=0){
  if(val === null || val === undefined) return '<span style="color:var(--text3)">null</span>';
  if(typeof val === 'string') return `<span style="color:#a5f3fc">${escHtml(val)}</span>`;
  if(typeof val === 'number') return `<span style="color:#f9a8d4">${val}</span>`;
  if(typeof val === 'boolean') return `<span style="color:#86efac">${val}</span>`;
  if(Array.isArray(val)){
    if(val.length === 0) return '<span style="color:var(--text3)">[]</span>';
    if(val.every(v=>typeof v==='string')){
      return '<ul style="list-style:disc;padding-left:16px;margin:4px 0;">'+val.map(v=>`<li style="color:var(--text2);font-size:.76rem;padding:2px 0;">${escHtml(v)}</li>`).join('')+'</ul>';
    }
    return '<div style="display:flex;flex-direction:column;gap:6px;margin:4px 0;">'+val.map(v=>`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px;">${renderValue(v, depth+1)}</div>`).join('')+'</div>';
  }
  if(typeof val === 'object'){
    return Object.entries(val).map(([k,v])=>`
      <div style="display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(30,51,80,.4);">
        <span style="color:var(--text3);font-size:.72rem;min-width:140px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;">${escHtml(k)}</span>
        <div style="flex:1;">${renderValue(v, depth+1)}</div>
      </div>`).join('');
  }
  return escHtml(String(val));
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

renderAgentList();
</script>
